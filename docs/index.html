itle":"Jewish federations in the United States","filename":"wiki_pages/nodes/jewish-federations-in-the-united-states.md","markdown":"# Jewish federations in the United States\n\n## Overview\n\nJewish federations in the United States is an American Jewish federations involved in the philanthropic apparatus for Israeli causes. Jewish federations in the United States funds causes in Israel.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_jewish_communities":{"item_id":"group_jewish_communities","kind":"node","title":"Jewish communities around the world","filename":"wiki_pages/nodes/jewish-communities-around-the-world.md","markdown":"# Jewish communities around the world\n\n## Overview\n\nJewish communities around the world is global Jewish communities connected to Israel through philanthropy and institutional ties. Jewish communities around the world maintains contact with Israel.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_israeli_program_graduates":{"item_id":"group_israeli_program_graduates","kind":"node","title":"Israeli program graduates","filename":"wiki_pages/nodes/israeli-program-graduates.md","markdown":"# Israeli program graduates\n\n## Overview\n\nIsraeli program graduates is Israeli graduates of Tikvah programs who later served as lecturers. Israeli program graduates taught at Tikvah seminars in Israel.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_american_jewish_philanthropists":{"item_id":"group_american_jewish_philanthropists","kind":"node","title":"American Jewish philanthropists","filename":"wiki_pages/nodes/american-jewish-philanthropists.md","markdown":"# American Jewish philanthropists\n\n## Overview\n\nAmerican Jewish philanthropists is an American Jewish donors and foundations supporting Israeli organizations. American Jewish philanthropists received funding from Shalem College (formerly Shalem Center).\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_american_republican_funders":{"item_id":"group_american_republican_funders","kind":"node","title":"American Republican funders","filename":"wiki_pages/nodes/american-republican-funders.md","markdown":"# American Republican funders\n\n## Overview\n\nAmerican Republican funders is American Republican-linked funders associated with Kohelet in media accounts cited by the article.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_american_conservative_jews":{"item_id":"group_american_conservative_jews","kind":"node","title":"American conservative Jews","filename":"wiki_pages/nodes/american-conservative-jews.md","markdown":"# American conservative Jews\n\n## Overview\n\nAmerican conservative Jews is American Jews associated with conservative ideology and the critical community described. American conservative Jews transferred ideas to Israeli conservatism.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_american_conservative_actors":{"item_id":"group_american_conservative_actors","kind":"node","title":"American conservative actors","filename":"wiki_pages/nodes/american-conservative-actors.md","markdown":"# American conservative actors\n\n## Overview\n\nAmerican conservative actors is American actors associated with conservative ideology, funding, institutions, or political networks. American conservative actors is associated with American conservatism.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_israeli_conservatives":{"item_id":"group_israeli_conservatives","kind":"node","title":"Israeli conservatives","filename":"wiki_pages/nodes/israeli-conservatives.md","markdown":"# Israeli conservatives\n\n## Overview\n\nIsraeli conservatives is Israeli actors and groups adopting or promoting conservative ideas. Israeli conservatives is associated with Israeli conservatism.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_anglo_immigrants":{"item_id":"group_anglo_immigrants","kind":"node","title":"Anglo immigrants","filename":"wiki_pages/nodes/anglo-immigrants.md","markdown":"# Anglo immigrants\n\n## Overview\n\nAnglo immigrants are English-speaking immigrants whose role in Israeli conservative civil society is part of the article’s account of Americanization. The graph represents them as helping shape Israeli conservatism rather than as a bounded organization.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_zionist_intellectuals":{"item_id":"group_zionist_intellectuals","kind":"node","title":"Zionist intellectuals","filename":"wiki_pages/nodes/zionist-intellectuals.md","markdown":"# Zionist intellectuals\n\n## Overview\n\nZionist intellectuals is new generation of Zionist intellectuals that Argaman Institute aims to train.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_kpf_staff":{"item_id":"group_kpf_staff","kind":"node","title":"Kohelet staff","filename":"wiki_pages/nodes/kohelet-staff.md","markdown":"# Kohelet staff\n\n## Overview\n\nKohelet staff is staff of Kohelet, many of whom participated in Tikvah seminars. Kohelet staff participated in Tikvah seminars in New York.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_american_lecturers":{"item_id":"group_american_lecturers","kind":"node","title":"American lecturers","filename":"wiki_pages/nodes/american-lecturers.md","markdown":"# American lecturers\n\n## Overview\n\nAmerican lecturers enlisted by Tikvah to teach conservative seminars in Israel. American lecturers taught at Tikvah seminars in Israel.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"group_kpf_researchers":{"item_id":"group_kpf_researchers","kind":"node","title":"Kohelet researchers","filename":"wiki_pages/nodes/kohelet-researchers.md","markdown":"# Kohelet researchers\n\n## Overview\n\nKohelet researchers is researchers at Kohelet who commonly write for Mida and HaShiloach. Kohelet researchers write for HaShiloach and Mida website.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_israeli_neoconservatism_baselines":{"item_id":"obj_israeli_neoconservatism_baselines","kind":"node","title":"Israeli Neo-Conservatism: The Baselines","filename":"wiki_pages/nodes/israeli-neo-conservatism-the-baselines.md","markdown":"# *Israeli Neo-Conservatism: The Baselines*\n\n## Overview\n\n*Israeli Neo-Conservatism: The Baselines* is an article by Assaf Malach published in HaShiloach and dedicated to the first Israeli Conservatism Conference. In the graph, it links HaShiloach, neo-conservatism, Assaf Malach, and the conference infrastructure of Israeli conservatism.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_abraham_lincoln_redeemer":{"item_id":"obj_abraham_lincoln_redeemer","kind":"node","title":"Abraham Lincoln: Redeemer President","filename":"wiki_pages/nodes/abraham-lincoln-redeemer-president.md","markdown":"# *Abraham Lincoln: Redeemer President*\n\n## Overview\n\nAbraham Lincoln: Redeemer President is a book by Allen C. Abraham Lincoln: Redeemer President was translated into Hebrew by The Tikvah Fund. Abraham Lincoln: Redeemer President was written by Allen C. Guelzo.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_bullies":{"item_id":"obj_bullies","kind":"node","title":"Bullies","filename":"wiki_pages/nodes/bullies.md","markdown":"# *Bullies*\n\n## Overview\n\nBullies is a book by Ben Shapiro translated into Hebrew by Tikvah-backed efforts. Bullies was translated into Hebrew by The Tikvah Fund. Bullies was written by Ben Shapiro.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_cynical_theories":{"item_id":"obj_cynical_theories","kind":"node","title":"Cynical Theories","filename":"wiki_pages/nodes/cynical-theories.md","markdown":"# *Cynical Theories*\n\n## Overview\n\nCynical Theories is a book by Helen Pluckrose and James Lindsay translated into Hebrew by Tikvah-backed efforts. Cynical Theories was translated into Hebrew by The Tikvah Fund. Cynical Theories was written by Helen Pluckrose and James Lindsay.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_land_of_hope":{"item_id":"obj_land_of_hope","kind":"node","title":"Land of Hope","filename":"wiki_pages/nodes/land-of-hope.md","markdown":"# *Land of Hope*\n\n## Overview\n\nLand of Hope is a book by Wilfred M. Land of Hope was translated into Hebrew by The Tikvah Fund. Land of Hope was written by Wilfred M. McClay.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_leviathan":{"item_id":"obj_leviathan","kind":"node","title":"Leviathan","filename":"wiki_pages/nodes/leviathan.md","markdown":"# *Leviathan*\n\n## Overview\n\nLeviathan is a book by Thomas Hobbes translated into Hebrew by Shalem. Leviathan was translated into Hebrew by Shalem College (formerly Shalem Center). Leviathan was written by Thomas Hobbes.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_reflections_france":{"item_id":"obj_reflections_france","kind":"node","title":"Reflections on the Revolution in France","filename":"wiki_pages/nodes/reflections-on-the-revolution-in-france.md","markdown":"# *Reflections on the Revolution in France*\n\n## Overview\n\nReflections on the Revolution in France is a book by Edmund Burke translated into Hebrew by Shalem. Reflections on the Revolution in France was translated into Hebrew by Shalem College (formerly Shalem Center). Reflections on the Revolution in France was written by Edmund Burke.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_suicide_west":{"item_id":"obj_suicide_west","kind":"node","title":"Suicide of the West","filename":"wiki_pages/nodes/suicide-of-the-west.md","markdown":"# *Suicide of the West*\n\n## Overview\n\nSuicide of the West is a book by James Burnham translated into Hebrew by Tikvah-backed efforts. Suicide of the West was translated into Hebrew by The Tikvah Fund. Suicide of the West was written by James Burnham.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_constitution_liberty":{"item_id":"obj_constitution_liberty","kind":"node","title":"The Constitution of Liberty","filename":"wiki_pages/nodes/the-constitution-of-liberty.md","markdown":"# *The Constitution of Liberty*\n\n## Overview\n\nThe Constitution of Liberty is a book by Friedrich Hayek translated into Hebrew by Shalem. The Constitution of Liberty was translated into Hebrew by Shalem College (formerly Shalem Center). The Constitution of Liberty was written by Friedrich Hayek.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_recovery_family_life":{"item_id":"obj_recovery_family_life","kind":"node","title":"The Recovery of Family Life","filename":"wiki_pages/nodes/the-recovery-of-family-life.md","markdown":"# *The Recovery of Family Life*\n\n## Overview\n\nThe Recovery of Family Life is a book by Scott Yenor translated into Hebrew by Tikvah-backed efforts. The Recovery of Family Life was translated into Hebrew by The Tikvah Fund. The Recovery of Family Life was written by Scott Yenor.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_road_to_serfdom":{"item_id":"obj_road_to_serfdom","kind":"node","title":"The Road to Serfdom","filename":"wiki_pages/nodes/the-road-to-serfdom.md","markdown":"# *The Road to Serfdom*\n\n## Overview\n\nThe Road to Serfdom is a book by Friedrich Hayek translated into Hebrew by Shalem. The Road to Serfdom was translated into Hebrew by Shalem College (formerly Shalem Center). The Road to Serfdom was written by Friedrich Hayek.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_organizational_websites":{"item_id":"obj_organizational_websites","kind":"node","title":"Organizational websites","filename":"wiki_pages/nodes/organizational-websites.md","markdown":"# Organizational websites\n\n## Overview\n\nOrganizational websites used as public-domain data sources. Organizational websites was used as data about Kohelet Policy Forum, Shalem College (formerly Shalem Center), and The Tikvah Fund.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_legislative_research":{"item_id":"obj_legislative_research","kind":"node","title":"Legislative research","filename":"wiki_pages/nodes/legislative-research.md","markdown":"# Legislative research\n\n## Overview\n\nLegislative research is research-based products produced by Kohelet for decision-makers. Legislative research is produced by Kohelet Policy Forum.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_newsletters":{"item_id":"obj_newsletters","kind":"node","title":"Newsletters","filename":"wiki_pages/nodes/newsletters.md","markdown":"# Newsletters\n\n## Overview\n\nNewsletters are treated as public-domain data sources used to study the Israeli conservative civil society organizations discussed in the article.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_policy_papers":{"item_id":"obj_policy_papers","kind":"node","title":"Policy papers","filename":"wiki_pages/nodes/policy-papers.md","markdown":"# Policy papers\n\n## Overview\n\nPolicy papers is research and policy documents produced by Kohelet and other think tanks. Policy papers is produced by Kohelet Policy Forum.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_protocols":{"item_id":"obj_protocols","kind":"node","title":"Protocols","filename":"wiki_pages/nodes/protocols.md","markdown":"# Protocols\n\n## Overview\n\nProtocols are treated as public-domain data sources used to study the Israeli conservative civil society organizations discussed in the article.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_tikvah_center":{"item_id":"obj_tikvah_center","kind":"node","title":"Tikvah Center","filename":"wiki_pages/nodes/tikvah-center.md","markdown":"# Tikvah Center\n\n## Overview\n\nTikvah Center is an educational center in midtown Manhattan offering study programs related to Jewish thought, policy, war, statesmanship, economics, and social thought. Tikvah Center is located in Manhattan. Tikvah Center is operated by The Tikvah Fund.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_hashiloach_journal":{"item_id":"obj_hashiloach_journal","kind":"node","title":"HaShiloach journal","filename":"wiki_pages/nodes/hashiloach-journal.md","markdown":"# *HaShiloach journal*\n\n## Overview\n\nHaShiloach is a Hebrew journal of thought and policy linked in the article to The Tikvah Fund. It published Assaf Malach’s *Israeli Neo-Conservatism: The Baselines*, and Yoav Sorek was recruited as its editor-in-chief.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_azure":{"item_id":"obj_azure","kind":"node","title":"Azure / Tchelet","filename":"wiki_pages/nodes/azure-tchelet.md","markdown":"# *Azure / Tchelet*\n\n## Overview\n\nAzure / Tchelet was a conservative-leaning magazine published by Shalem until January 2012. In the article’s account, it belongs to Shalem’s earlier publishing infrastructure.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_israel_hayom":{"item_id":"obj_israel_hayom","kind":"node","title":"Israel Hayom","filename":"wiki_pages/nodes/israel-hayom.md","markdown":"# *Israel Hayom*\n\n## Overview\n\nIsrael Hayom is a conservative-leaning newspaper discussed as a political investment for the Israeli right. The article associates it with Sheldon and Miriam Adelson and describes it as serving Benjamin Netanyahu’s politics.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_american_conservative_literature":{"item_id":"obj_american_conservative_literature","kind":"node","title":"American conservative literature","filename":"wiki_pages/nodes/american-conservative-literature.md","markdown":"# American conservative literature\n\n## Overview\n\nAmerican conservative literature is American conservative books and articles translated into Hebrew by Tikvah-linked efforts. American conservative literature was translated into Hebrew by The Tikvah Fund.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_conservative_classics":{"item_id":"obj_conservative_classics","kind":"node","title":"Conservative classics","filename":"wiki_pages/nodes/conservative-classics.md","markdown":"# Conservative classics\n\n## Overview\n\nConservative classics is conservative texts translated by Shalem into Hebrew. Conservative classics was translated into Hebrew by Shalem College (formerly Shalem Center).\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"obj_mida_website":{"item_id":"obj_mida_website","kind":"node","title":"Mida website","filename":"wiki_pages/nodes/mida-website.md","markdown":"# Mida website\n\n## Overview\n\nMida is a right-wing Israeli news and commentary website that operates under the auspices of To the Individual: Civic Freedom and Responsibility. The site is supported financially in part by The Tikvah Fund, presents itself through classical liberal and conservative liberal value orientations, and critiques public discourse on climate change from an ultra-conservative or libertarian vantage point. Meir Rubin, the CEO of Kohelet Policy Forum, was formerly a board member of Mida.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_argaman_conference_2022":{"item_id":"event_argaman_conference_2022","kind":"node","title":"Argaman Institute conservative conference 2022","filename":"wiki_pages/nodes/argaman-institute-conservative-conference-2022.md","markdown":"# Argaman Institute conservative conference 2022\n\n## Overview\n\nThe Argaman Institute conservative conference of 2022 was organized by Argaman Institute in Jerusalem. Ran Bar-Yoshafat, Kohelet’s deputy director, spoke at the conference, linking the event to the broader Israeli conservative organizational field.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_israeli_conservatism_conference":{"item_id":"event_israeli_conservatism_conference","kind":"node","title":"Israeli Conservatism Conference","filename":"wiki_pages/nodes/israeli-conservatism-conference.md","markdown":"# Israeli Conservatism Conference\n\n## Overview\n\nThe Israeli Conservatism Conference is a Tikvah-organized conference series that convened Israeli and American conservative actors. Mike Pompeo and Tom Cotton spoke at the 2021 conference, and the series is part of the article’s account of conferences as infrastructure for ideological transfer.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_israeli_conservatism_conference_2019":{"item_id":"event_israeli_conservatism_conference_2019","kind":"node","title":"Israeli Conservatism Conference 2019","filename":"wiki_pages/nodes/israeli-conservatism-conference-2019.md","markdown":"# Israeli Conservatism Conference 2019\n\n## Overview\n\nThe 2019 Israeli Conservatism Conference was initiated by The Tikvah Fund and served as the first conference in the series. Assaf Malach’s article *Israeli Neo-Conservatism: The Baselines* was dedicated to this first conference.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_israeli_conservatism_conference_2021":{"item_id":"event_israeli_conservatism_conference_2021","kind":"node","title":"Israeli Conservatism Conference 2021","filename":"wiki_pages/nodes/israeli-conservatism-conference-2021.md","markdown":"# Israeli Conservatism Conference 2021\n\n## Overview\n\nThe 2021 Israeli Conservatism Conference was organized by The Tikvah Fund and took place in Jerusalem. Mike Pompeo and Tom Cotton spoke at the event, making it a visible site of Israeli and American conservative encounter.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_israeli_conservatism_conference_2022":{"item_id":"event_israeli_conservatism_conference_2022","kind":"node","title":"Israeli Conservatism Conference 2022","filename":"wiki_pages/nodes/israeli-conservatism-conference-2022.md","markdown":"# Israeli Conservatism Conference 2022\n\n## Overview\n\nThe 2022 Israeli Conservatism Conference is treated as part of the Tikvah-initiated Israeli Conservatism Conference series, which the article presents as part of the institutional infrastructure of Israeli conservatism.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_americanization_israeli_right_conference":{"item_id":"event_americanization_israeli_right_conference","kind":"node","title":"The Americanization of the Israeli Right conference","filename":"wiki_pages/nodes/americanization-of-the-israeli-right-conference.md","markdown":"# The Americanization of the Israeli Right conference\n\n## Overview\n\n2021 Tel Aviv University conference addressing the Americanization of the Israeli right. The Americanization of the Israeli Right conference contextualizes public attention to March 2023 judicial reform strike. The Americanization of the Israeli Right conference was held at Tel Aviv University.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_tikvah_israel_seminars":{"item_id":"event_tikvah_israel_seminars","kind":"node","title":"Tikvah seminars in Israel","filename":"wiki_pages/nodes/tikvah-seminars-in-israel.md","markdown":"# Tikvah seminars in Israel\n\n## Overview\n\nTikvah seminars in Israel were part of The Tikvah Fund’s post-2017 Israeli programming. American lecturers and later Israeli program graduates taught in these seminars, making them a mechanism for transferring and localizing American conservative ideas.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_tikvah_new_york_seminars":{"item_id":"event_tikvah_new_york_seminars","kind":"node","title":"Tikvah seminars in New York","filename":"wiki_pages/nodes/tikvah-seminars-in-new-york.md","markdown":"# Tikvah seminars in New York\n\n## Overview\n\nTikvah seminars in New York brought Israelis into Tikvah’s educational network before 2017. Many Kohelet staff participated in these seminars before or during their employment at Kohelet.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"event_judicial_reform_strike_2023":{"item_id":"event_judicial_reform_strike_2023","kind":"node","title":"March 2023 judicial reform strike","filename":"wiki_pages/nodes/march-2023-judicial-reform-strike.md","markdown":"# March 2023 judicial reform strike\n\n## Overview\n\nMarch 2023 judicial reform strike is strike day in response to the Israeli government's judicial reform plans when Arnon Bar-David criticized Kohelet. March 2023 judicial reform strike responded to Judicial reform.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"value_free_market":{"item_id":"value_free_market","kind":"node","title":"Free-market principles","filename":"wiki_pages/nodes/free-market-principles.md","markdown":"# Free-market principles\n\n## Overview\n\nFree-market principles promoted by Kohelet and Tikvah-linked conservative infrastructure. Free-market principles is promoted by Kohelet Policy Forum.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"value_religion_nationalism_market":{"item_id":"value_religion_nationalism_market","kind":"node","title":"Religion, nationalism, and free market linkage","filename":"wiki_pages/nodes/religion-nationalism-and-free-market-linkage.md","markdown":"# Religion, nationalism, and free market linkage\n\n## Overview\n\nReligion, nationalism, and free market linkage is connection between religion, nationalism, and the free market identified as a conservative American ideal promoted by Kohelet. Religion, nationalism, and free market linkage is promoted by Kohelet Policy Forum.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"ideo_american_conservatism":{"item_id":"ideo_american_conservatism","kind":"node","title":"American conservatism","filename":"wiki_pages/nodes/american-conservatism.md","markdown":"# American conservatism\n\n## Overview\n\nAmerican conservatism is the ideological source field whose ideas, institutions, texts, and funding practices are shown moving into Israeli conservative civil society. In the article’s account, The Tikvah Fund promotes American conservatism, American conservative actors are associated with it, and American conservative ideas diffuse into Israeli conservatism.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"ideo_classical_liberalism":{"item_id":"ideo_classical_liberalism","kind":"node","title":"Classical liberalism","filename":"wiki_pages/nodes/classical-liberalism.md","markdown":"# Classical liberalism\n\n## Overview\n\nClassical liberalism is value orientation used by Mida to describe itself. Classical liberalism is promoted by Mida website.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"ideo_conservative_liberalism":{"item_id":"ideo_conservative_liberalism","kind":"node","title":"Conservative liberalism","filename":"wiki_pages/nodes/conservative-liberalism.md","markdown":"# Conservative liberalism\n\n## Overview\n\nConservative liberalism is value orientation used by Mida to describe itself. Conservative liberalism is promoted by Mida website.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"ideo_israeli_conservatism":{"item_id":"ideo_israeli_conservatism","kind":"node","title":"Israeli conservatism","filename":"wiki_pages/nodes/israeli-conservatism.md","markdown":"# Israeli conservatism\n\n## Overview\n\nIsraeli conservatism is the Israeli conservative movement shaped in the article through transnational transfer from American conservative ideas, institutions, people, and funding networks. American conservatism diffuses into Israeli conservatism, American conservative Jews transfer ideas into it, and Anglo immigrants help shape it.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"ideo_neoconservatism":{"item_id":"ideo_neoconservatism","kind":"node","title":"Neo-conservatism","filename":"wiki_pages/nodes/neo-conservatism.md","markdown":"# Neo-conservatism\n\n## Overview\n\nNeo-conservatism is conservative ideological formation discussed in relation to Israeli and American politics.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"value_zionism":{"item_id":"value_zionism","kind":"node","title":"Zionism","filename":"wiki_pages/nodes/zionism.md","markdown":"# Zionism\n\n## Overview\n\nZionism is ideological field connected to several organizations, publications, and educational initiatives. Zionism is promoted by Shalem College (formerly Shalem Center).\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"value_jewish_nation_state":{"item_id":"value_jewish_nation_state","kind":"node","title":"Nation-state of the Jewish people","filename":"wiki_pages/nodes/nation-state-of-the-jewish-people.md","markdown":"# Nation-state of the Jewish people\n\n## Overview\n\nNation-state of the Jewish people is Kohelet mission statement goal. Nation-state of the Jewish people is promoted by Kohelet Policy Forum.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"value_individual_liberty":{"item_id":"value_individual_liberty","kind":"node","title":"Individual liberty","filename":"wiki_pages/nodes/individual-liberty.md","markdown":"# Individual liberty\n\n## Overview\n\nIndividual liberty is value named in Kohelet mission statement and linked to American conservative/libertarian thought. Individual liberty is promoted by Kohelet Policy Forum.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"value_representative_democracy":{"item_id":"value_representative_democracy","kind":"node","title":"Representative democracy","filename":"wiki_pages/nodes/representative-democracy.md","markdown":"# Representative democracy\n\n## Overview\n\nRepresentative democracy is Kohelet mission statement goal. Representative democracy is promoted by Kohelet Policy Forum.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_ariel_university_school_medicine":{"item_id":"org_ariel_university_school_medicine","kind":"node","title":"Ariel University School of Medicine","filename":"wiki_pages/nodes/ariel-university-school-of-medicine.md","markdown":"# Ariel University School of Medicine\n\n## Overview\n\nAriel University School of Medicine receives significant funding from the Adelson family in the article’s account of American-linked support for Israeli institutions.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_cufi":{"item_id":"org_cufi","kind":"node","title":"Christians United for Israel","filename":"wiki_pages/nodes/christians-united-for-israel.md","markdown":"# Christians United for Israel\n\n## Overview\n\nChristians United for Israel receives significant funding from the Adelson family in the article’s account of American-linked support for Israeli and pro-Israel institutions.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_guidestar_israel":{"item_id":"org_guidestar_israel","kind":"node","title":"GuideStar Israel","filename":"wiki_pages/nodes/guidestar-israel-registrar-of-associations.md","markdown":"# GuideStar Israel\n\n## Overview\n\nGuideStar Israel is used as a source of official associational data about the Israeli organizations discussed in the article, including Kohelet Policy Forum, Shalem College, Argaman Institute, Jerusalem Institute for Market Studies, and To the Individual: Civic Freedom and Responsibility.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_birthright":{"item_id":"org_birthright","kind":"node","title":"Birthright","filename":"wiki_pages/nodes/birthright.md","markdown":"# Birthright\n\n## Overview\n\nBirthright receives significant funding from the Adelson family in the article’s account of American-linked philanthropic support for Israeli and Jewish institutional projects.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_guidestar_candid":{"item_id":"org_guidestar_candid","kind":"node","title":"GuideStar / Candid","filename":"wiki_pages/nodes/guidestar-candid.md","markdown":"# GuideStar / Candid\n\n## Overview\n\nGuideStar / Candid is used as a North American financial-information source about the organizations discussed in the article, including Kohelet Policy Forum, Shalem College, Argaman Institute, Jerusalem Institute for Market Studies, and To the Individual: Civic Freedom and Responsibility.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_shalem_foundation":{"item_id":"org_shalem_foundation","kind":"node","title":"The Shalem Foundation","filename":"wiki_pages/nodes/the-shalem-foundation.md","markdown":"# The Shalem Foundation\n\n## Overview\n\nThe Shalem Foundation is a Delaware-registered foundation associated with foreign funding for Shalem College. Public records cited in the article connect Ronald Lauder and Sheldon Adelson to support for the foundation, which funds Shalem College and owns shares in the Shalem Center.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_tikvah_fund":{"item_id":"org_tikvah_fund","kind":"node","title":"The Tikvah Fund","filename":"wiki_pages/nodes/the-tikvah-fund.md","markdown":"# The Tikvah Fund\n\n## Overview\n\nThe Tikvah Fund was established by Zalman Bernstein and is presented in the article as a major American conservative institution active in Israel. Its role is not only philanthropic: it helped move American conservative ideas into Israeli civil society through seminars, publications, Hebrew translations, conferences, and institutional support. The article links Tikvah to Shalem College, Kohelet Policy Forum, Argaman Institute, HaShiloach, Mida, and a wider project of translating American conservative literature into Hebrew.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_american_friends_kohelet":{"item_id":"org_american_friends_kohelet","kind":"node","title":"American Friends of Kohelet Policy Forum","filename":"wiki_pages/nodes/american-friends-of-kohelet-policy-forum.md","markdown":"# American Friends of Kohelet Policy Forum\n\n## Overview\n\nAmerican Friends of Kohelet Policy Forum is an American friends-of fundraising organization connected to Kohelet’s funding. Arthur Dantchik donated through it, and the organization reflects the friends-of model used to move American philanthropic support into Israeli institutions.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_ministry_finance":{"item_id":"org_ministry_finance","kind":"node","title":"Israeli Ministry of Finance","filename":"wiki_pages/nodes/israeli-ministry-of-finance.md","markdown":"# Israeli Ministry of Finance\n\n## Overview\n\nIsraeli Ministry of Finance is Israeli government ministry where Michael Sarel served as chief economist.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_argaman":{"item_id":"org_argaman","kind":"node","title":"Argaman Institute","filename":"wiki_pages/nodes/argaman-institute.md","markdown":"# Argaman Institute\n\n## Overview\n\nArgaman Institute is treated in the article as part of the right-wing Israeli conservative CSO network. It aims to train Zionist intellectuals, organized a conservative conference in Jerusalem in 2022, and appears in the article among Tikvah-linked Israeli conservative activities.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_hartman_institute":{"item_id":"org_hartman_institute","kind":"node","title":"Hartman Institute","filename":"wiki_pages/nodes/hartman-institute.md","markdown":"# Hartman Institute\n\n## Overview\n\nHartman Institute is Israeli nonprofit that Arthur Dantchik donated to. Hartman Institute received donations from Arthur Dantchik.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_hashiloach":{"item_id":"org_hashiloach","kind":"node","title":"HaShiloach","filename":"wiki_pages/nodes/hashiloach.md","markdown":"# HaShiloach\n\n## Overview\n\nHaShiloach is Israeli journal of thought and policy published in Hebrew since 2016. Israeli Neo-Conservatism: The Baselines was published in HaShiloach. HaShiloach was published or supported by The Tikvah Fund. HaShiloach has writing by Riki Maman. HaShiloach has writing by Kohelet researchers. HaShiloach had writing by Moshe Koppel.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_histadrut":{"item_id":"org_histadrut","kind":"node","title":"Histadrut","filename":"wiki_pages/nodes/histadrut.md","markdown":"# Histadrut\n\n## Overview\n\nHistadrut is israel's General Federation of Labor. Histadrut is chaired by Arnon Bar-David.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_dewey_ballantine":{"item_id":"org_dewey_ballantine","kind":"node","title":"Dewey Ballantine LLP","filename":"wiki_pages/nodes/dewey-ballantine-llp.md","markdown":"# Dewey Ballantine LLP\n\n## Overview\n\nDewey Ballantine LLP is new York law firm where Seth Goldstein began his career.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_george_mason_law":{"item_id":"org_george_mason_law","kind":"node","title":"George Mason University Law School","filename":"wiki_pages/nodes/george-mason-university-law-school.md","markdown":"# George Mason University Law School\n\n## Overview\n\nGeorge Mason University Law School is law school that is a subunit of George Mason University and is affiliated with Eugene Kontorovich. George Mason University Law School is part of George Mason University.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_makor_rishon":{"item_id":"org_makor_rishon","kind":"node","title":"Makor Rishon","filename":"wiki_pages/nodes/makor-rishon.md","markdown":"# Makor Rishon\n\n## Overview\n\nMakor Rishon is Israeli newspaper whose reporting is cited regarding Kohelet.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_jewish_exponent":{"item_id":"org_jewish_exponent","kind":"node","title":"The Jewish Exponent","filename":"wiki_pages/nodes/the-jewish-exponent.md","markdown":"# The Jewish Exponent\n\n## Overview\n\nThe Jewish Exponent is philadelphia Jewish newspaper whose editorial is discussed in relation to Dantchik ending support for Kohelet. The Jewish Exponent condemned Arthur Dantchik.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_to_the_individual":{"item_id":"org_to_the_individual","kind":"node","title":"To the Individual: Civic Freedom and Responsibility","filename":"wiki_pages/nodes/to-the-individual-civic-freedom-and-responsibility.md","markdown":"# To the Individual: Civic Freedom and Responsibility\n\n## Overview\n\nTo the Individual: Civic Freedom and Responsibility is a nonprofit treated in the article as part of the right-wing Israeli conservative CSO network. It is the organization under whose auspices the Mida website operates.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_knesset":{"item_id":"org_knesset","kind":"node","title":"Knesset","filename":"wiki_pages/nodes/knesset.md","markdown":"# Knesset\n\n## Overview\n\nKnesset is Israeli parliament.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_institute_advanced_studies":{"item_id":"org_institute_advanced_studies","kind":"node","title":"Institute for Advanced Studies","filename":"wiki_pages/nodes/institute-for-advanced-studies.md","markdown":"# Institute for Advanced Studies\n\n## Overview\n\nInstitute for Advanced Studies is princeton-associated institute where Moshe Koppel spent a year.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_israel_democracy_institute":{"item_id":"org_israel_democracy_institute","kind":"node","title":"Israel Democracy Institute","filename":"wiki_pages/nodes/israel-democracy-institute.md","markdown":"# Israel Democracy Institute\n\n## Overview\n\nIsrael Democracy Institute is Israeli think tank described as a model/counterweight in discussion of Kohelet.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_jerusalem_institute_market_studies":{"item_id":"org_jerusalem_institute_market_studies","kind":"node","title":"Jerusalem Institute for Market Studies","filename":"wiki_pages/nodes/jerusalem-institute-for-market-studies.md","markdown":"# Jerusalem Institute for Market Studies\n\n## Overview\n\nJerusalem Institute for Market Studies is treated in the article as part of the right-wing Israeli conservative CSO network. The article connects it to free-market policy activity and public-sphere work around the legalization of marijuana.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_kohelet":{"item_id":"org_kohelet","kind":"node","title":"Kohelet Policy Forum","filename":"wiki_pages/nodes/kohelet-policy-forum.md","markdown":"# Kohelet Policy Forum\n\n## Overview\n\nKohelet Policy Forum is an Israeli conservative think tank founded by Moshe Koppel and treated in the article as part of the right-wing Israeli conservative CSO network. It produces legislative research and policy papers, provides policy material to Knesset decision-makers, and promotes free-market principles, individual liberty, representative democracy, and Israel as the nation-state of the Jewish people. The article ties Kohelet to judicial reform, American Friends of Kohelet Policy Forum, The Tikvah Fund, and Arthur Dantchik.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_manhattan_institute":{"item_id":"org_manhattan_institute","kind":"node","title":"Manhattan Institute","filename":"wiki_pages/nodes/manhattan-institute.md","markdown":"# Manhattan Institute\n\n## Overview\n\nManhattan Institute is conservative American think tank in New York chaired by Roger Hertog. Manhattan Institute is chaired by Roger Hertog.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_shalem":{"item_id":"org_shalem","kind":"node","title":"Shalem College (formerly Shalem Center)","filename":"wiki_pages/nodes/shalem-college-formerly-shalem-center.md","markdown":"# Shalem College (formerly Shalem Center)\n\n## Overview\n\nShalem College, formerly Shalem Center, is an Israeli conservative institution treated in the article as part of the right-wing Israeli conservative CSO network. It was founded by Daniel Polisar, Joshua Weinstein, Martin Kramer, Ofir Haivry, and Yoram Hazony, adopted an American liberal arts college model, and translated conservative classics into Hebrew. The article connects Shalem to The Tikvah Fund, The Shalem Foundation, foreign Jewish philanthropy, and a broader effort to create a counterweight to post-Zionist academia.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_bar_ilan_university":{"item_id":"org_bar_ilan_university","kind":"node","title":"Bar-Ilan University","filename":"wiki_pages/nodes/bar-ilan-university.md","markdown":"# Bar-Ilan University\n\n## Overview\n\nBar-Ilan University is Israeli university associated with Moshe Koppel, Avi Bell, and other Kohelet-linked figures. Bar-Ilan University has as a law professor Avi Bell. Bar-Ilan University has as a faculty member Moshe Koppel.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_george_mason_university":{"item_id":"org_george_mason_university","kind":"node","title":"George Mason University","filename":"wiki_pages/nodes/george-mason-university.md","markdown":"# George Mason University\n\n## Overview\n\nGeorge Mason University is a university where Russ Roberts taught. George Mason University had teaching by Russ Roberts.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_harvard_university":{"item_id":"org_harvard_university","kind":"node","title":"Harvard University","filename":"wiki_pages/nodes/harvard-university.md","markdown":"# Harvard University\n\n## Overview\n\nHarvard University is a university associated with Avi Bell. Avi Bell graduated from Harvard University.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_princeton_university":{"item_id":"org_princeton_university","kind":"node","title":"Princeton University","filename":"wiki_pages/nodes/princeton-university.md","markdown":"# Princeton University\n\n## Overview\n\nPrinceton University is associated with the origin story of Shalem through Yoram Hazony and Daniel Polisar. Daniel Polisar and Yoram Hazony were both students at Princeton University.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_stanford_university":{"item_id":"org_stanford_university","kind":"node","title":"Stanford University","filename":"wiki_pages/nodes/stanford-university.md","markdown":"# Stanford University\n\n## Overview\n\nStanford University is a university where Russ Roberts taught. Stanford University had teaching by Russ Roberts.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_tel_aviv_university":{"item_id":"org_tel_aviv_university","kind":"node","title":"Tel Aviv University","filename":"wiki_pages/nodes/tel-aviv-university.md","markdown":"# Tel Aviv University\n\n## Overview\n\nTel Aviv University is a university where the 2021 conference on the Americanization of the Israeli Right was held.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_ucla":{"item_id":"org_ucla","kind":"node","title":"University of California, Los Angeles","filename":"wiki_pages/nodes/university-of-california-los-angeles.md","markdown":"# University of California, Los Angeles\n\n## Overview\n\nUniversity of California, Los Angeles is a university where Russ Roberts taught. University of California, Los Angeles had teaching by Russ Roberts.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_university_chicago":{"item_id":"org_university_chicago","kind":"node","title":"University of Chicago","filename":"wiki_pages/nodes/university-of-chicago.md","markdown":"# University of Chicago\n\n## Overview\n\nUniversity of Chicago is a university associated with Avi Bell and Eugene Kontorovich. Avi Bell and Eugene Kontorovich graduated from University of Chicago.\n\n## References\n\n- Segal, A. A., & Greenspan, I. (2024). The Americanization of Israeli Conservative Civil Society: A critical community and transnational transference perspective. Israel Studies, 29(2), 144-169.\n"},"org_university_rochester":{"item_id":"org_university_rochester","kind":"node","title":"University of Rochester","filename":"wiki_pages/ ],layout:layoutOptions()});
cy.ready(()=>{cy.layout(layoutOptions()).run();cy.fit(undefined,100);updateStats()});
cy.on('tap','node, edge',evt=>{const ele=evt.target;openWiki(ele.isNode()?'node':'edge',ele.data('wiki_id')||ele.id());focus(ele)});
function focus(ele){cy.elements().removeClass('faded highlight');const nb=neighborhoodForFocus(ele);cy.elements().not(nb).addClass('faded');nb.addClass('highlight')}
function openWiki(kind,id){const page=WIKI[id];document.getElementById('wikiTitle').textContent=page?page.title:id;document.getElementById('wikiSub').innerHTML=`<span class="badge">${kind}</span> <code>${esc(id)}</code>`;document.getElementById('wikiContent').innerHTML=page?mdToHtml(page.markdown):`<p>No wiki page found for <code>${esc(id)}</code>.</p>`;if(page)linkifyWikiContent(id);document.getElementById('wikiPanel').classList.add('open')}
function closeWiki(){document.getElementById('wikiPanel').classList.remove('open')}
document.getElementById('layoutBtn').onclick=()=>cy.layout(layoutOptions()).run();document.getElementById('fitBtn').onclick=()=>{cy.elements().removeClass('faded highlight');cy.fit(undefined,100);updateStats()};document.getElementById('zoomPreset').addEventListener('change',e=>{const pct=Number(e.target.value);if(!pct)return;cy.zoom({level:pct/100,renderedPosition:{x:cy.width()/2,y:cy.height()/2}});updateStats()});cy.on('zoom',updateStats);
function initFilters(){const types=[...new Set(CY_NODES.map(n=>n.data.type).filter(Boolean))].sort(),rels=[...new Set(CY_EDGES.map(e=>e.data.relationship).filter(Boolean))].sort(),fields=[...new Set(CY_NODES.map(n=>n.data.political_field).filter(Boolean))].sort();typeFilter.innerHTML='<option value="">All node types</option>'+types.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join('');relFilter.innerHTML='<option value="">All edge types</option>'+rels.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join('');fieldFilter.innerHTML='<option value="">All political fields</option>'+fields.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join('')}
initFilters();
function applyFilters(){const type=typeFilter.value,rel=relFilter.value,field=fieldFilter.value;cy.elements().style('display','element');cy.nodes().forEach(n=>{if((type&&n.data('type')!==type)||(field&&n.data('political_field')!==field))n.style('display','none')});cy.edges().forEach(e=>{if(rel&&e.data('relationship')!==rel)e.style('display','none');if(e.source().style('display')==='none'||e.target().style('display')==='none')e.style('display','none')});updateStats()}['typeFilter','relFilter','fieldFilter'].forEach(id=>document.getElementById(id).addEventListener('input',applyFilters));
const search=document.getElementById('search'),results=document.getElementById('results');search.addEventListener('input',updateSearch);search.addEventListener('focus',updateSearch);
function updateSearch(){const q=search.value.trim().toLowerCase();if(!q){results.style.display='none';return}const items=[];cy.nodes().forEach(n=>{const hay=[n.data('label'),n.data('type'),n.data('subtype'),n.data('political_field'),n.id()].join(' ').toLowerCase();if(hay.includes(q))items.push({kind:'node',id:n.id(),title:n.data('label'),meta:n.data('type')})});cy.edges().forEach(e=>{const hay=[e.data('label'),e.data('relationship'),e.id()].join(' ').toLowerCase();if(hay.includes(q))items.push({kind:'edge',id:e.id(),title:e.data('label'),meta:e.data('relationship')})});const top=items.slice(0,20);results.innerHTML=top.length?top.map(r=>`<div class="result" onclick="chooseResult('${r.kind}','${esc(r.id)}')"><div class="result-title">${esc(r.title)}</div><div class="result-meta">${esc(r.kind)} · ${esc(r.meta)}</div></div>`).join(''):'<div class="result"><div class="result-title">No results</div></div>';results.style.display='block'}
function chooseResult(kind,id){results.style.display='none';const ele=cy.getElementById(id);cy.elements().unselect();ele.select();cy.animate({fit:{eles:neighborhoodForFocus(ele),padding:100},duration:500});openWiki(kind,id);focus(ele)}
function updateStats(){document.getElementById('statsBox').innerHTML=`<strong>${cy.nodes().filter(n=>n.visible()).length}</strong> nodes · <strong>${cy.edges().filter(e=>e.visible()).length}</strong> edges<br><span style="color:#666">Use the zoom preset menu for 30%–200% jumps, then use the mouse wheel or trackpad for manual zoom.</span>`}
</script></body></html>
